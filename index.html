    const { useState, useEffect } = React;


// ─── PRINT HANDOVER ───────────────────────────────────────────────────────────
function printHandover(type, hover, completed) {
  const isPending = type === "pending";
  const list = isPending ? hover : completed;
  const taskKey = isPending ? "incomplete" : "done_tasks";
  const taskIcon = isPending ? "○" : "✓";
  const title = isPending ? "Pending Tasks — Shift Handover" : "Completed Tasks — Shift Handover";
  const dateStr = new Date().toLocaleString("en-AU", { weekday:"long", day:"numeric", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit" });

  const rows = list.map(p => `
    <div class="patient">
      <div class="pt-header">
        <span class="chip">${p.subcatLabel}</span>
        <span class="pt-name">${p.room ? `[${p.room}] ` : ""}${p.name}</span>
        <span class="priority">● ${p.priority}</span>
      </div>
      ${p.notes ? `<div class="note">📋 ${p.notes}</div>` : ""}
      <div class="tasks">
        ${p[taskKey].map(t => `<div class="task">${taskIcon} ${t.name}</div>`).join("")}
      </div>
    </div>
  `).join("");

  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Georgia', serif; color: #2d3748; background: #fff; padding: 32px 40px; font-size: 13px; }
    h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
    .date { font-size: 11px; color: #9a9088; margin-bottom: 24px; letter-spacing: 0.06em; }
    .patient { border-left: 3px solid #c4a46a; padding: 10px 14px; margin-bottom: 10px; page-break-inside: avoid; }
    .pt-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .chip { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #7a9088; background: #f2ede8; border: 1px solid #ddd6ce; border-radius: 3px; padding: 1px 6px; }
    .pt-name { font-size: 14px; font-weight: 700; }
    .priority { font-size: 10px; color: #c4a46a; }
    .note { font-size: 11px; color: #9a9088; margin-bottom: 6px; }
    .task { font-size: 12px; color: ${isPending ? "#5a6a7a" : "#5a8a6a"}; padding: 2px 0; }
    .footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid #e8e0d8; font-size: 10px; color: #b0a89e; text-align: center; letter-spacing: 0.06em; }
    @media print { body { padding: 20px 24px; } }
  </style></head><body>
    <h1>CAREFLOW — ${title}</h1>
    <div class="date">${dateStr}</div>
    ${list.length === 0 ? "<p style='color:#b0a89e'>Nothing to report.</p>" : rows}
    <div class="footer">Generated by CAREFLOW · Confidential clinical document</div>
  </body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 300);
}

// ─── RFH WIZARD TASK SETS ─────────────────────────────────────────────────────
const RFH_STANDARD    = ["Vital signs", "Pain charting", "Progress note"];
const RFH_FALL_NO_CTB = ["Neurological observations", "Vital signs", "Pain charting", "Progress note"];

const SECTION_ORDER = ["NEW_INCIDENT","FOLLOW_UP","GOVERNANCE","INFECTION","BEHAVIOURAL","TRANSITIONS","OTHER"];
const PRIO_COLOR = { High: "#c4817a", Medium: "#c4a46a", Low: "#8fa3b1" };
const PRIO_BG    = { High: "#fdf6f5", Medium: "#fdf9f2", Low: "#f7f9fa" };
const STORAGE_KEY = "careflow4_v2";

let _uid = Date.now();
const uid     = () => `${++_uid}`;
const mkTasks = (names) => names.map(n => ({ id: uid(), name: n, done: false }));
const load    = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } };
const save    = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };
const blank   = () => ({ name:"", room:"", priority:"High", notes:"", customTasks:[], selectedSubcats:[] });

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function CareFlow4() {
  const [patients, setPatients] = useState(load);
  const [view,     setView]     = useState("board");
  const [modal,    setModal]    = useState(null);
  const [expanded, setExpanded] = useState({});
  const [form,     setForm]     = useState(blank());
  const [wizard,   setWizard]   = useState(null);
  const [hvTab,    setHvTab]    = useState("pending");

  useEffect(() => save(patients), [patients]);

  const toggleTask  = (pid, tid) => setPatients(ps => ps.map(p => p.id !== pid ? p : { ...p, tasks: p.tasks.map(t => t.id !== tid ? t : { ...t, done: !t.done }) }));
  const resolveP    = (id) => setPatients(ps => ps.map(p => p.id === id ? { ...p, resolved: !p.resolved } : p));
  const removeP     = (id) => setPatients(ps => ps.filter(p => p.id !== id));
  const updateNote  = (id, note) => setPatients(ps => ps.map(p => p.id === id ? { ...p, notes: note } : p));
  const toggleExp   = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));
  const openAdd     = () => { setForm(blank()); setModal("add"); };
  const getSub      = (sec, sub) => SECTIONS[sec]?.subcategories?.find(s => s.id === sub);

  const submitForm = () => {
    if (!form.selectedSubcats.length) return;
    // check if any selected subcat has a wizard
    const wizardEntry = form.selectedSubcats.find(({secId, subId}) => getSub(secId, subId)?.wizard);
    if (wizardEntry) { setWizard({ step: 1, snap: { ...form }, wizardEntry }); setModal("wizard"); return; }
    finaliseFull(form, null, null);
  };

  const finaliseFull = (f, wizardTaskOverride, warningTag) => {
    // merge tasks from all selected subcats, deduplicate by name
    const seen = new Set();
    const allTasks = [];
    f.selectedSubcats.forEach(({secId, subId}) => {
      const sub = getSub(secId, subId);
      if (!sub) return;
      const names = sub.customizable
        ? (f.customTasks.length > 0 ? f.customTasks : [])
        : (sub.wizard && wizardTaskOverride ? wizardTaskOverride : sub.tasks);
      names.forEach(n => { if (!seen.has(n)) { seen.add(n); allTasks.push(n); } });
    });

    // primary section = first selected
    const primary = f.selectedSubcats[0];
    const priSec  = SECTIONS[primary.secId];
    const priSub  = getSub(primary.secId, primary.subId);

    // build chip list for all selected
    const chips = f.selectedSubcats.map(({secId, subId}) => {
      const sec = SECTIONS[secId];
      const sub = getSub(secId, subId);
      return { label: sub?.label || "", color: sec?.color || "#94a3b8", dim: sec?.dim || "#f2ede8" };
    });

    setPatients(ps => [...ps, {
      id: uid(), name: f.name.trim(), room: f.room.trim(),
      section: primary.secId,
      subcatLabel: priSub?.label || "",
      sectionColor: priSec?.color || "#94a3b8",
      sectionDim: priSec?.dim || "#f2ede8",
      chips,
      priority: f.priority, notes: f.notes.trim(),
      tasks: mkTasks(allTasks),
      warningTag: warningTag || null,
      resolved: false,
      addedAt: new Date().toLocaleTimeString("en-AU", { hour:"2-digit", minute:"2-digit" }),
    }]);
    setModal(null); setWizard(null);
  };

  const doneWizard = (isFall, ctbDone) => {
    const f = wizard.snap;
    const taskOverride = (!isFall || ctbDone) ? RFH_STANDARD : RFH_FALL_NO_CTB;
    const warn = (isFall && !ctbDone) ? "NEUROLOGICAL OBSERVATIONS REQUIRED — CT BRAIN NOT COMPLETED · CONTINUE FOR 3 DAYS OR PER FACILITY POLICY" : null;
    finaliseFull(isFall && !ctbDone ? { ...f, priority: "High" } : f, taskOverride, warn);
  };

  const grouped = SECTION_ORDER
    .map(id => ({ id, sec: SECTIONS[id], pts: patients.filter(p => p.section === id) }))
    .filter(g => g.pts.length > 0);

  const total   = patients.reduce((a,p) => a + p.tasks.length, 0);
  const done    = patients.reduce((a,p) => a + p.tasks.filter(t => t.done).length, 0);
  const active  = patients.filter(p => !p.resolved).length;
  const high    = patients.filter(p => p.priority === "High" && !p.resolved).length;
  const hover     = patients.map(p => ({ ...p, incomplete: p.tasks.filter(t => !t.done) })).filter(p => p.incomplete.length > 0);
  const completed = patients.map(p => ({ ...p, done_tasks: p.tasks.filter(t => t.done) })).filter(p => p.done_tasks.length > 0);

  return (
    <div style={S.shell}>
      {/* HEADER */}
      <header style={S.header}>
        <div>
          <div style={S.logo}>CAREFLOW</div>
          <div style={S.sub}>Patient Monitoring Board</div>
        </div>
        <div style={S.hR}>
          <Pill n={active}           label="Active" />
          <Pill n={high}             label="High"   color="#f87171" />
          <Pill n={`${done}/${total}`} label="Tasks" color="#34d399" />
          <button style={{ ...S.navBtn, ...(view==="handover" ? S.navOn : {}) }}
            onClick={() => setView(v => v==="board" ? "handover" : "board")}>
            {view==="board" ? "Handover →" : "← Board"}
          </button>
          <button style={{ ...S.navBtn, borderColor:"#e8c99a", color:"#9a6f3a" }}
            onClick={() => setModal("new_shift")}>
            New Shift
          </button>
        </div>
      </header>

      {/* BOARD */}
      {view === "board" && (
        <main style={S.main}>
          {patients.length === 0 && <Empty icon="🩺" title="Board is clear" sub="Tap + to add a patient to monitoring" />}
          {grouped.map(({ id, sec, pts }) => (
            <div key={id}>
              <div style={{ ...S.secH, borderLeftColor: sec.color }}>
                <span style={{ color: sec.color }}>{sec.emoji}</span>
                <span style={{ ...S.secL, color: sec.color }}>{sec.label}</span>
                <span style={S.secC}>{pts.length}</span>
              </div>
              {["High","Medium","Low"].flatMap(pri =>
                pts.filter(p => p.priority === pri).map(pt => (
                  <PatientRow key={pt.id} pt={pt}
                    isOpen={!!expanded[pt.id]}
                    onOpen={() => toggleExp(pt.id)}
                    onCheck={toggleTask}
                    onResolve={() => resolveP(pt.id)}
                    onRemove={() => removeP(pt.id)}
                    onNote={(note) => updateNote(pt.id, note)}
                  />
                ))
              )}
            </div>
          ))}
        </main>
      )}

      {/* HANDOVER */}
      {view === "handover" && (
        <main style={S.main}>
          <div style={S.hvT}>Shift Handover Summary</div>
          <div style={S.hvS}>End of shift report — {new Date().toLocaleDateString("en-AU", { weekday:"long", day:"numeric", month:"long" })}</div>

          {/* TABS */}
          <div style={S.hvTabs}>
            {[["pending","⏳ Pending"],["completed","✅ Completed"]].map(([key, label]) => (
              <button key={key} onClick={() => setHvTab(key)} style={{
                ...S.hvTabBtn,
                background: hvTab === key ? "#fff" : "transparent",
                color: hvTab === key ? "#2d3748" : "#b0a89e",
                borderBottom: hvTab === key ? "2px solid #7a9abf" : "2px solid transparent",
              }}>{label}</button>
            ))}
          </div>

          {/* PENDING TAB */}
          {hvTab === "pending" && (
            hover.length === 0
              ? <Empty icon="✅" title="Nothing pending" sub="All tasks completed this shift" />
              : <>
                {hover.map(p => (
                  <div key={p.id} style={{ ...S.hvCard, borderLeftColor: p.sectionColor }}>
                    <div style={S.hvRow}>
                      <span style={{ ...S.chip, background: p.sectionDim, color: p.sectionColor, borderColor: p.sectionColor+"55" }}>{p.subcatLabel}</span>
                      <span style={S.hvName}>{p.room ? `[${p.room}] ` : ""}{p.name}</span>
                      <span style={{ fontSize: 10, color: PRIO_COLOR[p.priority] }}>● {p.priority}</span>
                    </div>
                    {p.notes && <div style={S.hvNote}>📋 {p.notes}</div>}
                    {p.incomplete.map(t => <div key={t.id} style={S.hvTask}>○ {t.name}</div>)}
                  </div>
                ))}
                <div style={S.hvBtnRow}>
                  <button style={S.copyBtn} onClick={() => {
                    const txt = `SHIFT HANDOVER — PENDING TASKS\n${new Date().toLocaleString("en-AU")}\n\n` +
                      hover.map(p =>
                        `[${p.room||"–"}] ${p.name} — ${p.subcatLabel}${p.notes ? `\nNote: ${p.notes}` : ""}\n` +
                        p.incomplete.map(t => `  ○ ${t.name}`).join("\n")
                      ).join("\n\n");
                    navigator.clipboard.writeText(txt).catch(()=>{});
                  }}>Copy</button>
                  <button style={S.printBtn} onClick={() => printHandover("pending", hover, completed)}>🖨 Print</button>
                </div>
              </>
          )}

          {/* COMPLETED TAB */}
          {hvTab === "completed" && (
            completed.length === 0
              ? <Empty icon="📋" title="Nothing completed yet" sub="Tick off tasks on the board as you go" />
              : <>
                {completed.map(p => (
                  <div key={p.id} style={{ ...S.hvCard, borderLeftColor: p.sectionColor }}>
                    <div style={S.hvRow}>
                      <span style={{ ...S.chip, background: p.sectionDim, color: p.sectionColor, borderColor: p.sectionColor+"55" }}>{p.subcatLabel}</span>
                      <span style={S.hvName}>{p.room ? `[${p.room}] ` : ""}{p.name}</span>
                      <span style={{ fontSize: 10, color: PRIO_COLOR[p.priority] }}>● {p.priority}</span>
                    </div>
                    {p.notes && <div style={S.hvNote}>📋 {p.notes}</div>}
                    {p.done_tasks.map(t => <div key={t.id} style={{ ...S.hvTask, color:"#7aad97" }}>✓ {t.name}</div>)}
                  </div>
                ))}
                <div style={S.hvBtnRow}>
                  <button style={S.copyBtn} onClick={() => {
                    const txt = `SHIFT HANDOVER — COMPLETED TASKS\n${new Date().toLocaleString("en-AU")}\n\n` +
                      completed.map(p =>
                        `[${p.room||"–"}] ${p.name} — ${p.subcatLabel}${p.notes ? `\nNote: ${p.notes}` : ""}\n` +
                        p.done_tasks.map(t => `  ✓ ${t.name}`).join("\n")
                      ).join("\n\n");
                    navigator.clipboard.writeText(txt).catch(()=>{});
                  }}>Copy</button>
                  <button style={S.printBtn} onClick={() => printHandover("completed", hover, completed)}>🖨 Print</button>
                </div>
              </>
          )}
        </main>
      )}

      {/* FAB */}
      {view === "board" && <button style={S.fab} onClick={openAdd}>+</button>}

      {/* MODALS */}
      {modal === "add" && (
        <Overlay onClose={() => setModal(null)}>
          <AddModal form={form} setForm={setForm} getSub={getSub} onSubmit={submitForm} onClose={() => setModal(null)} />
        </Overlay>
      )}
      {modal === "new_shift" && (
        <Overlay onClose={() => setModal(null)}>
          <div style={{ ...S.modal, maxWidth:360 }}>
            <div style={S.mT}>Start New Shift?</div>
            <div style={{ fontSize:13, color:"#9a9088", marginBottom:24, lineHeight:1.6 }}>
              This will clear the entire board. All current patients and tasks will be removed.<br/><br/>
              <strong style={{ color:"#2d3748" }}>Tip:</strong> Go to Handover first to copy or print anything you need to keep.
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <button style={S.cancelBtn} onClick={() => setModal(null)}>Cancel</button>
              <button style={{ ...S.confirmBtn, background:"#c4a46a" }} onClick={() => {
                setPatients([]);
                setExpanded({});
                setView("board");
                setModal(null);
              }}>Clear & Start Fresh</button>
            </div>
          </div>
        </Overlay>
      )}
        <Overlay onClose={() => { setModal(null); setWizard(null); }}>
          <WizardModal step={wizard.step} ptName={wizard.snap.name} ptRoom={wizard.snap.room}
            onStep={s => setWizard(w => ({ ...w, step: s }))}
            onComplete={doneWizard}
            onClose={() => { setModal(null); setWizard(null); }}
          />
        </Overlay>
      )}
    </div>
  );
}

// ─── PATIENT ROW ──────────────────────────────────────────────────────────────
function PatientRow({ pt, isOpen, onOpen, onCheck, onResolve, onRemove, onNote }) {
  const done  = pt.tasks.filter(t => t.done).length;
  const total = pt.tasks.length;
  const pct   = total > 0 ? (done / total) * 100 : 0;
  const allDone = done === total && total > 0;
  const [noteVal, setNoteVal] = useState(pt.notes || "");
  const [noteFocus, setNoteFocus] = useState(false);

  return (
    <div style={{
      ...S.ptRow,
      borderLeftColor: pt.resolved ? "#ddd6ce" : PRIO_COLOR[pt.priority],
      background: pt.resolved ? "#f7f4f1" : PRIO_BG[pt.priority],
      opacity: pt.resolved ? 0.6 : 1,
    }}>
      <div style={S.ptMain} onClick={onOpen}>
        <div style={S.ptL}>
          <span style={{ color: PRIO_COLOR[pt.priority], fontSize: 9 }}>●</span>
          {pt.room && <span style={S.roomTag}>{pt.room}</span>}
          <span style={S.ptName}>{pt.name}</span>
          {(pt.chips || [{ label: pt.subcatLabel, color: pt.sectionColor, dim: pt.sectionDim }]).map((c, i) => (
            <span key={i} style={{ ...S.chip, background: c.dim, color: c.color, borderColor: c.color+"44" }}>{c.label}</span>
          ))}
          {pt.resolved && <span style={S.resTag}>RESOLVED</span>}
        </div>
        <div style={S.ptR}>
          <span style={{ fontSize: 11, fontWeight: 700, color: allDone ? "#7aad97" : "#b0a89e", fontVariantNumeric: "tabular-nums" }}>{done}/{total}</span>
          <div style={S.mBar}><div style={{ ...S.mFill, width: `${pct}%`, background: allDone ? "#7aad97" : PRIO_COLOR[pt.priority] }} /></div>
          <span style={{ color: "#b0a89e", fontSize: 10 }}>{isOpen ? "▲" : "▼"}</span>
        </div>
      </div>

      {/* INLINE NOTE — always visible */}
      <div style={S.noteWrap} onClick={e => e.stopPropagation()}>
        <div style={{ fontSize: 10, color: "#b0a89e", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>Clinical Note</div>
        <textarea
          value={noteVal}
          placeholder="Type a note here and click Save..."
          onChange={e => setNoteVal(e.target.value)}
          onFocus={() => setNoteFocus(true)}
          onBlur={() => { setNoteFocus(false); onNote(noteVal); }}
          rows={2}
          style={{
            ...S.noteArea,
            borderColor: noteFocus ? pt.sectionColor : "#ddd6ce",
          }}
        />
        {noteFocus && (
          <button
            onMouseDown={e => { e.preventDefault(); onNote(noteVal); setNoteFocus(false); }}
            style={S.noteSave}
          >
            Save
          </button>
        )}
      </div>

      {pt.warningTag && <div style={S.warn}>⚠️ {pt.warningTag}</div>}

      {isOpen && (
        <div style={S.expArea}>
          <div style={{ fontSize: 10, color: "#b0a89e", marginBottom: 10 }}>Added {pt.addedAt}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
            {pt.tasks.map(t => (
              <label key={t.id} style={{ display: "flex", alignItems: "flex-start", gap: 9, cursor: "pointer" }}>
                <input type="checkbox" checked={t.done} onChange={() => onCheck(pt.id, t.id)}
                  style={{ accentColor: pt.sectionColor, width: 14, height: 14, cursor: "pointer", flexShrink: 0, marginTop: 2 }} />
                <span style={{ fontSize: 13, lineHeight: 1.45, color: t.done ? "#b0a89e" : "#2d3748", textDecoration: t.done ? "line-through" : "none" }}>
                  {t.name}
                </span>
              </label>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
            <button style={{ ...S.actBtn, color: pt.resolved ? "#10b981" : "#475569" }} onClick={onResolve}>
              {pt.resolved ? "↩ Reopen" : "✓ Resolve"}
            </button>
            <button style={{ ...S.actBtn, color: "#ef444455" }} onClick={onRemove}>× Remove</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADD MODAL ─────────────────────────────────────────────────────────────────
function AddModal({ form, setForm, getSub, onSubmit, onClose }) {

  const togSubcat = (secId, subId) => {
    const key = `${secId}::${subId}`;
    setForm(f => {
      const exists = f.selectedSubcats.find(s => s.secId===secId && s.subId===subId);
      return { ...f, selectedSubcats: exists
        ? f.selectedSubcats.filter(s => !(s.secId===secId && s.subId===subId))
        : [...f.selectedSubcats, { secId, subId, key }]
      };
    });
  };

  const isOn = (secId, subId) => !!form.selectedSubcats.find(s => s.secId===secId && s.subId===subId);

  const togCust = task => setForm(f => ({
    ...f, customTasks: f.customTasks.includes(task) ? f.customTasks.filter(t=>t!==task) : [...f.customTasks, task],
  }));

  const hasWizard = form.selectedSubcats.some(({secId, subId}) => getSub(secId, subId)?.wizard);
  const hasOther  = form.selectedSubcats.some(({secId, subId}) => getSub(secId, subId)?.customizable);

  return (
    <div style={S.modal}>
      <div style={S.mT}>Add Patient to Board</div>

      <div style={{ display:"flex", gap:10 }}>
        <Fld label="Resident Name *" sx={{ flex:2 }}>
          <MI placeholder="e.g. Margaret Smith" value={form.name} onChange={e => setForm(f=>({...f,name:e.target.value}))} autoFocus />
        </Fld>
        <Fld label="Room / Bed" sx={{ flex:1 }}>
          <MI placeholder="e.g. R14" value={form.room} onChange={e => setForm(f=>({...f,room:e.target.value}))} />
        </Fld>
      </div>

      <Fld label="Monitoring Categories — select all that apply">
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {Object.values(SECTIONS).map(sec => (
            <div key={sec.id}>
              <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color: sec.color, marginBottom:5 }}>
                {sec.emoji} {sec.label}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {sec.subcategories.map(sub => {
                  const on = isOn(sec.id, sub.id);
                  return (
                    <button key={sub.id} type="button" onClick={() => togSubcat(sec.id, sub.id)} style={{
                      fontSize:11, padding:"5px 10px", borderRadius:6, border:"1px solid",
                      cursor:"pointer", fontFamily:"inherit", fontWeight: on ? 700 : 500,
                      background: on ? sec.dim : "#f7f3ef",
                      color: on ? sec.color : "#9a9088",
                      borderColor: on ? sec.color : "#ddd6ce",
                      transition:"all 0.12s",
                    }}>{sub.label}</button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </Fld>

      {hasWizard && <div style={S.infoBox}>📋 Return from Hospital selected — you'll be asked about fall transfer and CT Brain status next.</div>}

      {hasOther && (
        <Fld label="Other Monitoring Tasks">
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {SECTIONS.OTHER.subcategories[0].availableTasks.map(task => {
              const on = form.customTasks.includes(task);
              return (
                <button key={task} type="button" onClick={() => togCust(task)} style={{
                  fontSize:11, padding:"4px 9px", borderRadius:6, border:"1px solid",
                  cursor:"pointer", fontFamily:"inherit",
                  background: on ? "#f4f7f9" : "#f7f3ef",
                  color: on ? "#8fa3b1" : "#9a9088",
                  borderColor: on ? "#8fa3b1" : "#ddd6ce",
                }}>{task}</button>
              );
            })}
          </div>
        </Fld>
      )}

      <Fld label="Priority">
        <div style={{ display:"flex", gap:8 }}>
          {["High","Medium","Low"].map(p => {
            const on = form.priority === p;
            return (
              <button key={p} type="button" onClick={() => setForm(f=>({...f,priority:p}))} style={{
                flex:1, padding:"8px 0", borderRadius:8, border:"1px solid",
                fontSize:12, cursor:"pointer", fontWeight:700, fontFamily:"inherit",
                color: on ? PRIO_COLOR[p] : "#9a9088",
                background: on ? PRIO_BG[p] : "transparent",
                borderColor: on ? PRIO_COLOR[p] : "#ddd6ce",
              }}>{p}</button>
            );
          })}
        </div>
      </Fld>

      <Fld label="Clinical Notes">
        <textarea placeholder="Brief situation summary..." value={form.notes}
          onChange={e => setForm(f=>({...f,notes:e.target.value}))}
          style={{ ...S.mi, height:60, resize:"vertical" }} />
      </Fld>

      <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:8 }}>
        <button style={S.cancelBtn} onClick={onClose}>Cancel</button>
        <button
          style={{ ...S.confirmBtn, opacity: (form.name.trim() && form.selectedSubcats.length > 0) ? 1 : 0.35 }}
          onClick={onSubmit}
          disabled={!form.name.trim() || form.selectedSubcats.length === 0}
        >
          {hasWizard ? "Next →" : "Add to Board"}
        </button>
      </div>
    </div>
  );
}

// ─── WIZARD MODAL ──────────────────────────────────────────────────────────────
function WizardModal({ step, ptName, ptRoom, onStep, onComplete, onClose }) {
  return (
    <div style={{ ...S.modal, maxWidth:380 }}>
      <div style={S.mT}>Return from Hospital — 24hr Monitoring</div>
      <div style={{ color:"#334155", fontSize:13, marginBottom:18 }}>{ptRoom ? `[${ptRoom}] ` : ""}{ptName}</div>

      {step === 1 && <>
        <div style={S.wizQ}>Was this a fall-related transfer?</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <button style={S.wBG} onClick={() => onStep(2)}>Yes — Fall Transfer</button>
          <button style={S.wBB} onClick={() => onComplete(false, null)}>No — Standard Return</button>
        </div>
      </>}

      {step === 2 && <>
        <div style={S.wizQ}>Was a CT Brain completed at the hospital?</div>
        <div style={{ color:"#f59e0b", fontSize:11, marginBottom:14 }}>⚠️ If unknown, select Not Completed — safer to over-monitor.</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:12 }}>
          <button style={S.wBG} onClick={() => onComplete(true, true)}>✓ CT Brain Completed</button>
          <button style={{ ...S.wBB, background:"#140606", borderColor:"#ef444433", color:"#f87171" }}
            onClick={() => onComplete(true, false)}>✗ CT Brain NOT Completed</button>
        </div>
        <button style={{ background:"none", border:"none", color:"#1e293b", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}
          onClick={() => onStep(1)}>← Back</button>
      </>}
    </div>
  );
}

// ─── MICRO COMPONENTS ─────────────────────────────────────────────────────────
function Overlay({ children, onClose }) {
  return (
    <div style={S.overlay} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      {children}
    </div>
  );
}
function Pill({ n, label, color="#64748b" }) {
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:16, fontWeight:800, color, lineHeight:1.1, fontVariantNumeric:"tabular-nums" }}>{n}</div>
      <div style={{ fontSize:9, color:"#b0a89e", letterSpacing:"0.14em", textTransform:"uppercase" }}>{label}</div>
    </div>
  );
}
function Empty({ icon, title, sub }) {
  return (
    <div style={{ textAlign:"center", padding:"80px 20px" }}>
      <div style={{ fontSize:40, marginBottom:12 }}>{icon}</div>
      <div style={{ fontSize:15, fontWeight:700, color:"#64748b", marginBottom:6 }}>{title}</div>
      <div style={{ fontSize:11, color:"#94a3b8" }}>{sub}</div>
    </div>
  );
}
function Fld({ label, children, sx }) {
  return <div style={{ marginBottom:12, ...sx }}><div style={S.mlbl}>{label}</div>{children}</div>;
}
function MI({ placeholder, value, onChange, autoFocus }) {
  return <input placeholder={placeholder} value={value} onChange={onChange} autoFocus={autoFocus} style={S.mi} />;
}
function MS({ value, onChange, children }) {
  return <select value={value} onChange={onChange} style={S.ms}>{children}</select>;
}

  logo: { fontSize:18, fontWeight:900, letterSpacing:"0.16em", color:"#2d3748" },
  sub: { fontSize:9, color:"#b0a89e", letterSpacing:"0.18em", textTransform:"uppercase" },
  hR: { display:"flex", gap:18, alignItems:"center" },

  noteSave: { position:"absolute", right:4, bottom:14, background:"#7a9abf", border:"none", borderRadius:5, padding:"3px 12px", color:"#fff", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" },

  confirmBtn: { background:"#7a9abf", border:"none", borderRadius:8, padding:"9px 22px", color:"#fff", fontSize:13, cursor:"pointer", fontWeight:700, fontFamily:"inherit" },
  wizQ: { fontSize:15, color:"#2d3748", fontWeight:600, marginBottom:18, lineHeight:1.5 },

};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CareFlow4 />);
  </script>
</body>
